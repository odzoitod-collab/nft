# Render Blueprint — статический сайт portalWEB (Vite + React)
# Документация: https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: portal-market
    env: static
    rootDir: portalWEB
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    # Переменные окружения задайте в Dashboard → Environment
    # VITE_* подставляются на этапе сборки
